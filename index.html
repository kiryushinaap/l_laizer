<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laizer - Childhood Dream</title>
    <!-- Using 98.css for the retro Windows aesthetic -->
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container"></div>
    <div class="bottom-image"></div>
    <div class="content-wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="Laizer Logo" class="logo">
        </div>

        <div class="window main-window">
            <div class="title-bar">
                <div class="title-bar-text">Welcome</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body">
                <p>What was your childhood dream?</p>
                <div class="field-row-stacked">
                    <!-- Textarea for the input with blinking cursor feel -->
                    <textarea id="dreamInput" rows="5" class="dream-textarea"></textarea>
                </div>
                
                <!-- Loading Simulation -->
                <div id="loadingContainer" style="display: none; margin-top: 15px;">
                    <div class="progress-indicator-container">
                        <div class="progress-bar-fill" id="loadingBar"></div>
                    </div>
                    <p style="font-size: 11px; text-align: left; margin-top: 5px; margin-bottom: 0;">Loading...</p>
                </div>

                <div class="button-container" id="sendBtnContainer">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
